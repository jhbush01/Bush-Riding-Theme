<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Submit a route — Bush Riding Map</title>
    <meta name="description" content="Share a gravel route with the Bush Riding community." />
    <link rel="canonical" href="https://bushridingmap.com/submit" />
    <meta name="theme-color" content="#E9E2D0" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles/app.css" />
    <link rel="stylesheet" href="styles/submit.css" />

    <script>
      // The community routes Worker.
      window.BRM_CONFIG = { communityApi: "https://api.bushridingmap.com" };
    </script>
  </head>
  <body class="submit-page">
    <main class="form-wrap">
      <a class="back" href="/">← Back to the map</a>
      <h1 class="form-title">Submit a route</h1>
      <p class="form-intro">
        Share a gravel route with the community. Upload a GPX (exported from your computer or
        head unit) and we'll review it before it goes on the map. Distance and elevation are
        worked out from the file.
      </p>

      <form id="route-form" class="route-form">
        <label class="field">
          <span class="field__label">GPX file *</span>
          <input type="file" name="gpx" accept=".gpx,application/gpx+xml" required />
        </label>

        <label class="field">
          <span class="field__label">Route name *</span>
          <input type="text" name="name" maxlength="80" required placeholder="e.g. Pomona Weekend Gravel" />
        </label>

        <label class="field">
          <span class="field__label">Region *</span>
          <input type="text" name="region" maxlength="80" required placeholder="e.g. Southern Downs" />
          <span class="field__hint">The riding area — keep it broad (e.g. Southern Downs, Glass House Mountains).</span>
        </label>

        <label class="field">
          <span class="field__label">State *</span>
          <select name="state" required>
            <option value="">Choose…</option>
            <option value="QLD">Queensland (QLD)</option>
            <option value="NSW">New South Wales (NSW)</option>
            <option value="VIC">Victoria (VIC)</option>
            <option value="TAS">Tasmania (TAS)</option>
            <option value="SA">South Australia (SA)</option>
            <option value="WA">Western Australia (WA)</option>
            <option value="NT">Northern Territory (NT)</option>
            <option value="ACT">ACT</option>
          </select>
        </label>

        <label class="field">
          <span class="field__label">Terrain *</span>
          <select name="difficulty" required>
            <option value="">Choose…</option>
            <option value="groomed">Groomed</option>
            <option value="rocky">Rocky</option>
            <option value="proper-mud">Proper Mud</option>
          </select>
        </label>

        <label class="field">
          <span class="field__label">Surface <span class="opt">(optional)</span></span>
          <input type="text" name="surface" maxlength="120" placeholder="e.g. 85% gravel, 15% sealed" />
        </label>

        <label class="field">
          <span class="field__label">Notes <span class="opt">(optional)</span></span>
          <textarea name="description" maxlength="400" rows="3" placeholder="A line or two about the ride."></textarea>
        </label>

        <label class="field">
          <span class="field__label">Photo <span class="opt">(optional)</span></span>
          <input type="file" name="photo" accept="image/*" />
        </label>

        <hr class="rule" />

        <label class="field">
          <span class="field__label">Contributed by <span class="opt">(shown publicly)</span></span>
          <input type="text" name="contributor" maxlength="80" placeholder="Your name, club or organisation" />
          <span class="field__hint">The full name credited on the route card.</span>
        </label>

        <label class="field">
          <span class="field__label">Your link <span class="opt">(optional)</span></span>
          <input type="url" name="contributor_url" maxlength="300" placeholder="Strava / RideWithGPS / website" />
          <span class="field__hint">Adds a “Check them out” button next to your name. Leave blank to just show the name.</span>
        </label>

        <label class="field">
          <span class="field__label">Your email *</span>
          <input type="email" name="email" required autocomplete="email" placeholder="you@email.com" />
          <span class="field__hint">So we can reach you about the route. Not shown publicly.</span>
        </label>

        <label class="consent">
          <input type="checkbox" name="consent" required />
          <span
            >I have the right to share this route, it doesn't cross private land or closed
            trails without permission, and I understand it will be published publicly. Routes
            are guides only — riders use them at their own risk.</span
          >
        </label>

        <button type="submit" class="button button--primary" id="submit-btn">Submit route</button>
        <p id="form-msg" class="form-msg" role="status" hidden></p>
      </form>
    </main>

    <script>
      const API = (window.BRM_CONFIG.communityApi || "").replace(/\/$/, "");
      const form = document.getElementById("route-form");
      const btn = document.getElementById("submit-btn");
      const msg = document.getElementById("form-msg");

      function show(text, ok) {
        msg.hidden = false;
        msg.textContent = text;
        msg.className = "form-msg " + (ok ? "is-ok" : "is-err");
      }

      if (!API) {
        btn.disabled = true;
        show("Submissions aren't live yet — check back soon.", false);
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        if (!API) return;
        btn.disabled = true;
        btn.textContent = "Submitting…";
        msg.hidden = true;
        try {
          const res = await fetch(API + "/submit", { method: "POST", body: new FormData(form) });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(data.error || "Submission failed.");
          form.reset();
          show(
            `Thanks! Got it — ${data.distance_km} km, ${data.elevation_gain_m} m climb. ` +
              `We'll review it and add it to the map.`,
            true
          );
        } catch (err) {
          show(err.message || "Something went wrong — try again.", false);
        } finally {
          btn.disabled = false;
          btn.textContent = "Submit route";
        }
      });
    </script>
  </body>
</html>
