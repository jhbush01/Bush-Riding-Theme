<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bush Riding Map</title>
    <meta
      name="description"
      content="Curated gravel routes across South East Queensland. Browse the map, take the track."
    />
    <link rel="canonical" href="https://bushridingmap.com/" />
    <meta name="theme-color" content="#2c2a24" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="apple-touch-icon" href="public/apple-touch-icon.png" />

    <!-- Open Graph / Twitter -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Bush Riding" />
    <meta property="og:title" content="Bush Riding Map" />
    <meta property="og:description" content="Curated gravel routes. Browse the map, take the track." />
    <meta property="og:url" content="https://bushridingmap.com/" />

    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Bush Riding Map" />
    <meta name="twitter:description" content="Curated gravel routes. Browse the map, take the track." />
    <meta name="twitter:image" content="https://bushridingmap.com/public/og-image.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles/app.css" />
    <link rel="stylesheet" href="styles/landing.css" />

  <body class="landing">
    <main class="hero">
      <div class="hero__center">
        <h1 class="hero__title">Bush Riding Map</h1>

      </div>
    </main>
